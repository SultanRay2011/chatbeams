<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chatbeams - Login</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .back-to-home {
      position: absolute;
      top: 20px;
      left: 20px;
      font-weight: bold;
      color: #43a047;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .back-to-home:hover {
      color: #2e7d32;
    }
    .form-container {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 300px;
      opacity: 0;
      transform: translateY(-50px);
      animation: fadeIn 1s forwards;
    }
    .form-container h2 {
      margin-bottom: 20px;
      color: #43a047;
      animation: slideIn 1s forwards;
    }
    .form-container input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
      animation: slideIn 1s forwards 0.5s;
    }
    .form-container button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      font-size: 1em;
      color: white;
      background-color: #388e3c;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.3s ease;
      animation: slideIn 1s forwards 1s;
    }
    .form-container button:hover {
      background-color: #2e7d32;
      transform: scale(1.05);
    }
    .form-container p {
      margin-top: 20px;
      animation: slideIn 1s forwards 1.5s;
    }
    .form-container a {
      color: #43a047;
      text-decoration: none;
    }
    .form-container a:hover {
      text-decoration: underline;
    }
    .error-message {
      color: red;
      display: none;
      margin-top: -10px;
      margin-bottom: 10px;
    }
    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-to-home">Back to Home</a>
  <div class="form-container">
    <h2>Login to Chatbeam</h2>
    <form id="loginForm">
      <input type="text" id="loginUsername" placeholder="Username" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <div id="loginError" class="error-message">Invalid credentials. Please try again.</div>
      <button type="submit">Login</button>
    </form>
    <p><a href="forgot_password.html">Forgot Password?</a></p>
    <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
